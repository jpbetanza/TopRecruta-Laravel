services:
  app:
    image: ghcr.io/OWNER/toprecruta-laravel:latest  # replace OWNER with your GitHub username/org
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - sqlite_data:/var/www/html/database
    environment:
      APP_NAME: TopRecruta
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8000}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Uncomment to enable automatic image updates via Watchtower
  # watchtower:
  #   image: containrrr/watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 300 app

volumes:
  sqlite_data:
